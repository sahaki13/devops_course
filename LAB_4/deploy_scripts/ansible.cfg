[defaults]
timeout               = 120
private_key_file      = /home/debian/.ssh/id_ed25519
interpreter_python    = /usr/bin/python3
executable            = /usr/bin/bash
display_skipped_hosts = true
# to tell ansible where to find roles
roles_path            = ./roles

[privilege_escalation]
# Specify the become method (e.g., sudo, su)
become_method = su
# Specify the user to become (optional)
become_user = root
# Specify flags
become_flags = '-'

[colors]
#highlight = white
#verbose = blue
verbose = green
#warn = bright purple
#error = red
#debug = dark gray
#deprecate = purple
#skip = cyan
#unreachable = red
#ok = green
#changed = yellow
#diff_add = green
#diff_remove = red
#diff_lines = cyan
