---
- name: Checking if Kubernetes is already installed
  become: true
  any_errors_fatal: true
  block:
    - name: Check if kube-apiserver port is open
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 6443
        state: started
        delay: 0
        timeout: 2
      register: k8s_port_check
      changed_when: false
      ignore_errors: true

    - name: Assert Kubernetes is NOT installed
      ansible.builtin.assert:
        that:
          - "k8s_port_check.failed"
        fail_msg: |
          Kubernetes already installed on {{ inventory_hostname }}!
          Port 6443 is open at {{ ansible_host | default(inventory_hostname) }}.
          Skipping installation.
        success_msg: "Port 6443 closed on {{ inventory_hostname }} - safe to install"
