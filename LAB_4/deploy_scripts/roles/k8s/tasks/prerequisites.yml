---
- name: Prerequisites (packages, timezone, swap, modules, sysctl)
  become: true
  block:
    - name: Create keyring dir if not exist
      ansible.builtin.file:
        path: /etc/apt/keyrings
        recurse: true
        state: directory

    - name: Set timezone to Europe/Moscow.
      community.general.timezone:
        name: Europe/Moscow

    - name: Disable swap.
      ansible.builtin.command: swapoff -a
      changed_when: true
      when: ansible_facts['swaptotal_mb'] > 0

    - name: Remove swap from fstab.
      ansible.builtin.lineinfile:
        path: '/etc/fstab'
        regexp: '\sswap\s'
        state: 'absent'

    - name: Add a new entry to /etc/hosts
      when: k8s_add_registry_domain_to_hosts | bool
      ansible.builtin.blockinfile:
        path: /etc/hosts
        append_newline: true
        prepend_newline: true
        block: |
          {% if k8s_insecure_registry.enabled %}
          {{ k8s_insecure_registry.ip }} {{ k8s_insecure_registry.dns_name }}
          {% else %}
          {{ k8s_secure_registry.ip }} {{ k8s_secure_registry.name }}
          {{ k8s_secure_registry.ip }} lab.myregistry.ru # in my case could not resolved the name when pull. idk why (rm the line in your case)
          {% endif %}
        insertafter: EOF

    # using with_items or loop means apt will be called for each package in the list independently.
    # below method improve install speed
    - name: Deps.
      ansible.builtin.apt:
        name: "{{ k8s_prerequisites_packages }}"
        state: present
        install_recommends: false
        update_cache: true

    - name: Modprobe modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
        # persistent: present
      with_items: "{{ k8s_container_and_network_modules }}"

    # Add modules to the single file persistent
    - name: Write modules to file
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/k8s.conf
        line: "{{ item }}"
        mode: "0644"
        create: true
      with_items: "{{ k8s_container_and_network_modules }}"

    - name: Set sysctl options k8s
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
      with_items:
        - { name: "net.bridge.bridge-nf-call-iptables", value: 1 }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: 1 }
        - { name: "net.ipv4.ip_forward", value: 1 }

    - name: Write sysctl conf to file
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: "0440"

    - name: IPVS mode setup
      when: k8s_ipvs_enable
      block:
        - name: Modprobe IPVS modules
          community.general.modprobe:
            name: "{{ item }}"
            state: present
          with_items: "{{ k8s_ipvs_modules }}"

        - name: Write modules to file
          ansible.builtin.lineinfile:
            path: /etc/modules-load.d/k8s-ipvs.conf
            line: "{{ item }}"
            mode: "0644"
            create: true
          with_items: "{{ k8s_ipvs_modules }}"
