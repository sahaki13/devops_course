---
- name: Uninstalling helm (Repository)
  become: true
  when: inventory_hostname is search("master") and helm_install_from_repo
  block:
    - name: Helm keyrings
      ansible.builtin.file:
        state: absent
        path: "{{ helm_keyrings_path }}"

    - name: Helm apt repository
      ansible.builtin.apt_repository:
        state: absent
        repo: "deb [signed-by={{ helm_keyrings_path }}] {{ helm_repo }}/any/ any main"
        filename: helm

    - name: Uninstall helm
      ansible.builtin.apt:
        state: absent
        clean: true
        name: "{{ helm_packages }}"

    - name: Helm shell completion
      ansible.builtin.file:
        path: /etc/bash_completion.d/helm
        state: absent

- name: Uninstalling helm (Tarball)
  become: true
  when: inventory_hostname is search("master") and not helm_install_from_repo
  block:
    - name: Delete binary
      ansible.builtin.file:
        path: "{{ helm_binary_path }}"
        state: absent

    - name: Delete archive
      ansible.builtin.file:
        path: "{{ helm_archive_download_path }}"
        state: absent

    - name: Delete shell completion
      ansible.builtin.file:
        path: /etc/bash_completion.d/helm
        state: absent
