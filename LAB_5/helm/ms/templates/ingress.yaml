{{- if and .Values.ingress.enabled (eq .Values.service.type "ClusterIP") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ms.name }}
  namespace: {{ .Values.ms.ns }}
  annotations:
    # LB type
    nginx.ingress.kubernetes.io/lb-method: "round_robin"
    # Redirect to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $.Values.ms.name }}
                port:
                  number: {{ $.Values.ms.port }}
          {{- end }}
    {{- end }}
{{- end }}
