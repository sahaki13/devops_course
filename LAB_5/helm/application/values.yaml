################################################################################
# custom values
nameOverride: ""
fullnameOverride: "echo-server"

app:
  image:
    repository: 192.168.99.100:5050/root/echo-server
    tag: 2.3.1
    digest: 898133473002c20d49ccaf23098cbbdc92a6dd4f6ef0c6506318d9fb7fcba846
  port: 3000
  replicas: 3
  update:
    maxUnavailable: 1 # Количество обновляемых подов в один момент
    maxSurge: 0 # Запрет на создание реплик выше того что в replicas
  podLabels: {}

  imagePullSecrets:
    - name: gitlab-insecure-registry

  probes:
    liveness:
      enabled: true
      path: /healthcheck
      periodSeconds: 8
    readiness:
      enabled: false
      path: /healthcheck
      periodSeconds: 30
  resources:
    requests:
      memory: 25Mi
      cpu: 100m
    limits:
      memory: 25Mi
      cpu: 100m
  envs:
    TZ: Europe/Moscow
    LOG_HOME: /log
    LOG_LEVEL: info
    # DOTENV_PATH: /empty/.env  # если сервис читает переменные из .env файла
  extraEnv:
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  initContainer:
    repository: docker.io/pnnlmiscscripts/curl-jq
    tag: 1.6-15
    # To obtain digest: docker inspect --format='{{index .RepoDigests 0}}' docker.io/pnnlmiscscripts/curl-jq:1.6-15
    digest: e308d4ceab91e8d857fdf529193092766b0eca523ae0f94cdbf06d0e0bd7d8d1
    isDebug: false

service:
  type: ClusterIP # NodePort or ClusterIP
  nodePort: 31001

ingress:
  enabled: true
  hosts:
    - host: echo-server.test.local # совпадает с тем, что в /etc/hosts добавили
      paths:
        - path: /
          pathType: Prefix

serviceAccount:
  create: true
  annotations: {}

vault:
  restApiEnabled: false  # init container approach
  address: http://vault-svc.vault.svc:8200
  role: vault-auth-dev-echo-server
  serviceAccountName: echo-server
  secret:
    # enginePathAPI: secrets/dev/echo-server/data/config
    enginePath: secrets/dev/echo-server
    name: config
    type: kv-v2
  vso:
    enabled: false  # enable vault secret operator
    staticSecretRefresh: 30s
    injectToFile: false

