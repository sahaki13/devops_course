apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.testPod.name }}-init-container
  namespace: {{ .Values.testPod.namespace }}
  labels:
    {{- include "vault.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    # "helm.sh/hook-weight": "-1"
spec:
  activeDeadlineSeconds: 20
  restartPolicy: Never
  serviceAccountName: {{ .Values.testPod.serviceAccountName }}
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    sysctls: []
  terminationGracePeriodSeconds: 0
  containers:
    - name: dev-jq-curl-1
      image: "docker.io/pnnlmiscscripts/curl-jq:1.6-15@sha256:e308d4ceab91e8d857fdf529193092766b0eca523ae0f94cdbf06d0e0bd7d8d1"
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      env:
        - name: TZ
          value: "Europe/Moscow"
        - name: VAULT_ADDR
          value: {{ .Values.testPod.vault.addr | quote }}
        - name: SECRET_PATH
          value: "{{ .Values.testPod.vault.secret.enginePathAPI }}"
        - name: ROLE
          value: {{ .Values.testPod.vault.role | quote }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e

          echo "Vault addr: $VAULT_ADDR"
          echo "Logging into Vault..."
          SA_TOKEN=$(cat /run/secrets/kubernetes.io/serviceaccount/token)

          VAULT_TOKEN=$(curl -s \
                        -X POST \
                        -d "{\"jwt\":\"$SA_TOKEN\",\"role\":\"$ROLE\"}" \
                         $VAULT_ADDR/v1/auth/kubernetes/login \
                         | jq -r '.auth.client_token')

          if [ "$VAULT_TOKEN" == "null" ] || [ "$VAULT_TOKEN" == "" ]
            then echo "Auth failed"
            exit 1
          fi

          echo "Getting secret: $SECRET_PATH"
          curl -s \
               -H "X-Vault-Token: $VAULT_TOKEN" \
               $VAULT_ADDR/v1/$SECRET_PATH \
               | jq -r '.data.data | keys[] as $k | "\($k)=\(.[$k])"' \
               | tee /tmp/.env
          sleep 2
