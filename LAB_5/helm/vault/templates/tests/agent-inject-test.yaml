{{- if .Values.injector.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.testPod.name }}-agent-injector
  namespace: {{ .Values.testPod.namespace }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "8"
    # agent-injector annotations
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "{{ .Values.testPod.vault.role }}"  # match with vault role
    vault.hashicorp.com/agent-inject-secret-noparse.txt: "{{ .Values.testPod.vault.secret.enginePathAPI }}"
    vault.hashicorp.com/agent-inject-template-env: |  # range each secret
      {{`{{- with secret .Values.testPod.vault.secret.enginePathAPI -}}
        {{- range $k, $v := .Data.data }}export {{ $k }}={{ $v }}{{"\n"}}{{- end -}}
      {{- end }}`}}
    vault.hashicorp.com/agent-inject-template-target: |  # targeted secret
      {{`{{- with secret .Values.testPod.vault.secret.enginePathAPI -}}
        server:
          port: 8080
        spring:
          datasource:
            url: jdbc:postgresql://localhost:5432/mydb?currentSchema=myschema
            username: {{ .Data.data.devsecret1 }}
            password: {{ .Data.data.devsecret2 }}
          jpa:
            hibernate:
              ddl-auto: update
      {{- end }}`}}
  labels:
    vault.hashicorp.com/agent-inject: "true"  # trigger mutation webhook by this label
spec:
  activeDeadlineSeconds: 20
  restartPolicy: Never
  serviceAccountName: {{ .Values.testPod.serviceAccountName }}
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    sysctls: []
  terminationGracePeriodSeconds: 0
  containers:
    - name: example-pod
      image: {{ .Values.testPod.image }}
      command:
        - /bin/sh
        - -ec
        - |
          #!/bin/sh

          # check injection
          cat /vault/secrets/noparse.txt
          echo "## ----------------------------------------------------- ##"
          cat /vault/secrets/env
          echo "## ----------------------------------------------------- ##"
          cat /vault/secrets/target
          echo "## ----------------------------------------------------- ##"

          # inject to env
          source /vault/secrets/env
          env
          sleep 2

          # run your app
          # java -jar ...
{{- end }}
