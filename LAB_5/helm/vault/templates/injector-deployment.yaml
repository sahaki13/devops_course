{{- if .Values.injector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vault.fullname" . }}-agent-injector
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "vault.name" . }}-agent-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    component: webhook
spec:
  replicas: {{ .Values.injector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ template "vault.name" . }}-agent-injector
      app.kubernetes.io/instance: {{ .Release.Name }}
      component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ template "vault.name" . }}-agent-injector
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: webhook
    spec:
      serviceAccountName: {{ include "vault.fullname" . }}-agent-injector
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .Values.injector.affinity.nodes }}
                      - {{ . | quote }}
                      {{- end }}
      containers:
        - name: agent-injector
          image: "{{ .Values.injector.image.repository }}:{{ .Values.injector.image.tag }}"
          imagePullPolicy: {{ .Values.injector.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
          env:
            - name: AGENT_INJECT_LISTEN
              value: ":{{ .Values.injector.port }}"
            - name: AGENT_INJECT_LOG_LEVEL
              value: {{ .Values.injector.logLevel | quote }}
            - name: AGENT_INJECT_VAULT_ADDR
              value: {{ .Values.injector.vaultAddr | quote }}
            - name: AGENT_INJECT_VAULT_AUTH_PATH
              value: {{ .Values.injector.authPath | quote }}
            - name: AGENT_INJECT_VAULT_IMAGE
              value: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
            {{- if .Values.injector.certs.secretName }}
            - name: AGENT_INJECT_TLS_CERT_FILE
              value: "/etc/webhook/certs/tls.key"
            - name: AGENT_INJECT_TLS_KEY_FILE
              value: "/etc/webhook/certs/tls.crt"
            {{- else }}
            - name: AGENT_INJECT_TLS_AUTO
              value: "{{ include "vault.fullname" . }}-agent-injector-cfg"
            - name: AGENT_INJECT_TLS_AUTO_HOSTS
              value: "{{ include "vault.fullname" . }}-agent-injector,{{ include "vault.fullname" . }}-agent-injector.vault,{{ include "vault.fullname" . }}-agent-injector.vault.svc,{{ include "vault.fullname" . }}-agent-injector.vault.svc.cluster.local"
            {{- end }}
            - name: AGENT_INJECT_LOG_FORMAT
              value: json
            - name: AGENT_INJECT_REVOKE_ON_SHUTDOWN
              value: "false"
            - name: AGENT_INJECT_CPU_REQUEST
              value: "250m"
            - name: AGENT_INJECT_CPU_LIMIT
              value: "500m"
            - name: AGENT_INJECT_MEM_REQUEST
              value: "64Mi"
            - name: AGENT_INJECT_MEM_LIMIT
              value: "128Mi"
            - name: AGENT_INJECT_DEFAULT_TEMPLATE
              value: "map"
            - name: AGENT_INJECT_TEMPLATE_CONFIG_EXIT_ON_RETRY_FAILURE
              value: "true"
          args:
            - agent-inject
            - 2>&1
          ports:
            - containerPort: {{ .Values.injector.port }}
              name: webhook
              protocol: TCP
          resources:
            {{- toYaml .Values.injector.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.injector.port }}
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "vault.fullname" . }}-agent-injector-certs
        - name: tmp
          emptyDir: {}
{{- end }}
