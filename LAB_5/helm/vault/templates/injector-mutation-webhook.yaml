{{- if .Values.injector.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "vault.fullname" . }}-agent-injector-cfg
  labels:
    app.kubernetes.io/name: {{ include "vault.name" . }}-agent-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
webhooks:
  - name: vault.hashicorp.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 30
    failurePolicy: Ignore
    # failurePolicy: Fail
    # matchPolicy: Equivalent
    # reinvocationPolicy: IfNeeded
    clientConfig:
      service:
        name: {{ include "vault.fullname" . }}-agent-injector
        namespace: {{ .Release.Namespace }}
        path: "/mutate"
      caBundle: {{ .Values.injector.certs.caBundle | quote }}
    rules:
      - operations:
          - "CREATE"
          - "UPDATE"
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        # scope: "Namespaced"
    # do not trigger mutation webhook within these ns
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
    objectSelector:
      matchExpressions:
        # mutation webhook trigger label
        - key: vault.hashicorp.com/agent-inject
          operator: In
          values:
            - "true"
{{- end }}
