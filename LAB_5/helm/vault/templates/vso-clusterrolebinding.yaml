{{- if .Values.vso.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault.name" . }}-secrets-operator-binding
  labels:
    app.kubernetes.io/name: {{ include "vault.name" . }}-secrets-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-secrets-operator-role
subjects:
  - kind: ServiceAccount
    name: vault-secrets-operator
    namespace: {{ .Values.vso.namespace | default .Release.Namespace }}
{{- end }}
