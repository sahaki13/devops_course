{{- if .Values.injector.enabled }}
  {{- /* Generate CA and certificates BEFORE any YAML keys */ -}}
  {{- $ca := genCA "vault-agent-injector-ca" 3650 -}}
  {{- $svcName := printf "%s-agent-injector" (include "vault.fullname" .) -}}
  {{- $ns := .Values.global.namespace | default .Release.Namespace -}}
  {{- $altNames := list
        $svcName
        (printf "%s.%s" $svcName $ns)
        (printf "%s.%s.svc" $svcName $ns)
        (printf "%s.%s.svc.cluster.local" $svcName $ns)
  -}}
  {{- $cert := genSignedCert $svcName nil $altNames 365 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vault.fullname" . }}-agent-injector-certs
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "vault.name" . }}-agent-injector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/tls
data:
  # tls.key: {{ $cert.Key | b64enc }}
  # tls.crt: {{ $cert.Cert | b64enc }}
  # ca.crt: {{ $ca.Cert | b64enc }}
  tls.key: {{ .Values.injector.certs.certName }}
  tls.crt: {{ .Values.injector.certs.keyName }}
  ca.crt: {{ .Values.injector.certs.caBundle }}
{{- end }}
