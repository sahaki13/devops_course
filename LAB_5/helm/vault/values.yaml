global:
  namespace: "vault"

addr: &vaultStsAddr "http://vault-svc.vault.svc:8200"

# --- ServiceAccounts ---
serviceAccounts:
  vault:
    create: true
    namespace: vault
    keepResource: false
  dev:
    create: false
    namespace: dev
    keepResource: false
  preprod:
    create: false
    namespace: preprod
    keepResource: false
  prod:
    create: false
    namespace: prod
    keepResource: false

jobs:
  image: docker.io/library/busybox:1.37.0-musl
  backoffLimit: 1
  deletePv:
    enabled: false
    ttlSecondsAfterFinished: 10
  createPv:
    enabled: false
    ttlSecondsAfterFinished: 10
  node:
    kubernetes.io/hostname: worker-0
  pvNodeNames:
    - worker-0

# --- ClusterRoleBinding ---
clusterRoleBinding:
  create: true
  name: role-tokenreview-binding
  keepResource: false

# --- Agent ---
agent:
  enabled: true
  name: vault
  replicas: 1
  podManagementPolicy: Parallel
  updateStrategy:
    type: OnDelete
  revisionHistoryLimit: 5
  image:
    repository: docker.io/hashicorp/vault
    tag: 1.21.4
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000
    container:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  affinity:
    nodes:
      - worker-0
      # - worker-1
      # - worker-2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  fsMountPoint: /mnt
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: local-storage
        accessModes: [ ReadWriteOnce ]
        resources:
          requests:
            storage: 128Mi
  env:
    TZ: Europe/Moscow
    SKIP_CHOWN: true
    SKIP_SETCAP: true
    HOME: /home/vault
  ports:
    api: 8200
    cluster: 8201
  lifecycle:
    postStart:
      enabled: true
      sleepSeconds: 5
      logPath: /tmp/init-log
      scripts:
        - /vault/scripts/init.sh
        - /vault/scripts/unseal.sh
        - /vault/scripts/upsert_auth_method.sh
        # - /vault/scripts/create_users.sh
        # - /vault/scripts/create_secrets.sh
    preStop:
      enabled: false
      sleepSeconds: 5
      commands:
        - /bin/sh
        - -c
        - sleep {{ .Values.agent.lifecycle.preStop.sleepSeconds }} && kill -SIGTERM $(pidof vault)

# --- Services ---
services:
  headless:
    name: vault-svc
    apiPort: 8200
    clusterPort: 8201
  ui:
    enabled: true
    # type: NodePort
    type: ClusterIP # ingress
    name: vault
    port: 8200
    nodePort: 32000

# --- Ingress ---
ingress:
  className: "nginx"
  hosts:
    - host: vault.test.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ""
      enabled: false
      hosts:
        - ""
      secret:  # autogen secret (fill crt and key)
        crt: ""
        key: ""
    - secretName: ""
      enabled: false  # another possible cert
      hosts:
        - ""
      secret:
        crt: ""
        key: ""

# --- ConfigMap (Vault) ---
configMap:
  vault:
    name: vault-cm
    namespace: vault

# --- Test Pod ---
testPod:
  enabled: false
  image: docker.io/pnnlmiscscripts/curl-jq:1.6-15
  name: vault-interaction-testpod
  namespace: dev
  serviceAccountName: echo-server
  vault:
    addr: *vaultStsAddr
    role: vault-auth-dev-echo-server
    secret:
      enginePathAPI: secrets/dev/echo-server/data/config
      enginePath: secrets/dev/echo-server
      name: config
      type: kv-v2
  vso:
    vaultConnectionName: vault-connection
    staticSecretRefresh: 30s
    injectToFile: false
  delay:
    enabled: true
    seconds: 20

# --- Vault Secret Operator ---
vso:
  enabled: false
  port: 8080
  replicas: 1
  namespace: vso

  affinity:
    nodes:
      - worker-1

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

  image:
    repository: docker.io/hashicorp/vault-secrets-operator
    tag: 1.3.0
    pullPolicy: IfNotPresent

  vaultAddr: *vaultStsAddr

# --- Agent Injector ---
injector:
  enabled: false
  port: 8080
  replicas: 1
  leaderElector:
    enabled: false

  image:
    repository: docker.io/hashicorp/vault-k8s
    tag: 1.7.3
    pullPolicy: IfNotPresent

  affinity:
    nodes:
      - worker-1

  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 64Mi

  vaultAddr: "http://vault-0.vault-svc.vault.svc:8200"
  authPath: "auth/kubernetes"
  logLevel: "trace"

  certs:
    secretName: vault-agent-injector-certs
    keyName: <tls.key_helm_render>
    certName: <tls.crt_helm_render>
    caBundle: <ca.crt_helm_render>

