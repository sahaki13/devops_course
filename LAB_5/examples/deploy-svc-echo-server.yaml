---
apiVersion: v1
kind: Service
metadata:
  namespace: echo-server
  name: echo-server-svc
spec:
  selector:
    app: echo-server
  type: NodePort
  ports:
    - protocol: TCP
      port: 3000
      nodePort: 33001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server-deploy
  namespace: echo-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      imagePullSecrets:
        - name: gitlab-insecure-registry
      containers:
        - name: echo-server
          image: 192.168.99.100:5050/root/echo-server:2.2.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 25Mi
              cpu: 100m
            limits:
              memory: 25Mi
              cpu: 100m
          env:
            - name: TZ
              value: Europe/Moscow
          # ports:
          #   - containerPort: 3000
          #     name: es-port
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
