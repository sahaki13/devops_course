--- # обязательно. создаем sa для разных ns, к которым далее будем разрешать доступ к vault jwt
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: echo-server # затем будет использовать в vault
  name: vault-auth # затем будет использоваться в vault role

---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: vault
  name: vault-auth # затем будет использоваться в vault role

--- # обязательно. связываем кластерную роль system:auth-delegator с sa
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: role-tokenreview-binding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    namespace: echo-server
    name: vault-auth
  - kind: ServiceAccount
    namespace: vault
    name: vault-auth

--- # headless service !!important for sts!!
apiVersion: v1
kind: Service
metadata:
  name: vault-svc # corresponding with serviceName
  namespace: vault
spec:
  selector:
    app: vault
  clusterIP: None # headless service
  publishNotReadyAddresses: true
  ports:
    - name: api-port
      port: 8200
      targetPort: api
    - name: cluster-port
      port: 8201
      targetPort: cluster

# дополнительный сервис для доступа к vault ui (первая реплика), простой способ доступа через NodePort
# пока не отработает readiness проба, доступа к ui не будет, поэтому чтобы появился доступ нужно сначала
# распаковать vault через unseal.sh зайдя в под, или убрать пробу
---
apiVersion: v1
kind: Service
metadata:
  name: vault-ui-nodeport-0-svc
  namespace: vault
spec:
  selector:
    app: vault
    # с помощью этого label можно достичь результата (возможность sts), что каждый nodePort смотрит на конкретный экземпляр vault,
    # тогда нужно добавлять еще один сервис, который будет смотреть на vault-1
    statefulset.kubernetes.io/pod-name: vault-0 # corresponding with pod label (sts)
  type: NodePort
  ports:
    - protocol: TCP
      port: 8200
      nodePort: 32000

# дополнительный сервис для доступа к vault ui (вторая реплика), простой способ доступа через NodePort
