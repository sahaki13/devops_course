apiVersion: v1 # версия API, используемая для создания объекта
kind: Pod # тип объекта
metadata: # метаданные объекта
  name: gcr # название объекта, в данном случае имя pod
spec: # спецификация объекта
  containers: # список контейнеров, которые определяем в pod
    - name: gcr # имя контейнера
      image: gcr.io/google-samples/hello-app:1.0 # имя образа на основе которого будет запущен контейнер
      # способ загрузки образа. "IfNotPresent" означает, что образ будет загружен только в том случае, если он отсутствует на узле.
      # (сначала проверяется есть ли локально, если есть то запускается)
      # еще вариант Always и он означает, что всегда перед стартом образа выполяется запрос в registry и только потом на узле)
      # может быть полезно, если обновляется функционал сервиса и при этом перезаписывается тег на такой же.
      imagePullPolicy: IfNotPresent
      resources: # ограничения по ресурсам
        requests:
          memory: 50Mi
          cpu: 100m
        limits:
          memory: 50Mi
          cpu: 100m
      env: # список переменных окружения
        - name: TZ
          value: Europe/Moscow
      ports: # список портов контейнера
        - containerPort: 8080 # Порт, на котором контейнер будет слушать входящие запросы
          name: gcr-port # Имя порта, которое можно использовать для ссылок на этот порт в других частях конфигурации.
