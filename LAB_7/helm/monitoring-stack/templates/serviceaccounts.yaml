{{- $components := dict
  "victoriametrics" (dict
    "enabled" .Values.victoriametrics.enabled
    "saCreate" .Values.victoriametrics.serviceAccount.create
    "saName" .Values.victoriametrics.serviceAccount.name
    "annotations" .Values.victoriametrics.serviceAccount.annotations
    "automount" .Values.victoriametrics.serviceAccount.automount
  )
  "grafana" (dict
    "enabled" .Values.grafana.enabled
    "saCreate" .Values.grafana.serviceAccount.create
    "saName" .Values.grafana.serviceAccount.name
    "annotations" .Values.grafana.serviceAccount.annotations
    "automount" .Values.grafana.serviceAccount.automount
  )
  "nodeexporter" (dict
    "enabled" .Values.nodeexporter.enabled
    "saCreate" .Values.nodeexporter.serviceAccount.create
    "saName" .Values.nodeexporter.serviceAccount.name
    "annotations" .Values.nodeexporter.serviceAccount.annotations
    "automount" .Values.nodeexporter.serviceAccount.automount
  )
  "cadvisor" (dict
    "enabled" .Values.cadvisor.enabled
    "saCreate" .Values.cadvisor.serviceAccount.create
    "saName" .Values.cadvisor.serviceAccount.name
    "annotations" .Values.cadvisor.serviceAccount.annotations
    "automount" .Values.cadvisor.serviceAccount.automount
  )
  "kubestatemetrics" (dict
    "enabled" .Values.kubestatemetrics.enabled
    "saCreate" .Values.kubestatemetrics.serviceAccount.create
    "saName" .Values.kubestatemetrics.serviceAccount.name
    "annotations" .Values.kubestatemetrics.serviceAccount.annotations
    "automount" .Values.kubestatemetrics.serviceAccount.automount
  )
}}

{{- range $componentName, $componentConfig := $components }}
{{- if and $componentConfig.enabled $componentConfig.saCreate }}
{{- $fullName := include "monitoring-stack.fullname" $ }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $componentConfig.saName }}
  namespace: {{ $.Values.global.namespace | default $.Release.Namespace }}
  labels:
    {{- include "monitoring-stack.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $componentName }}
  {{- with $componentConfig.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $componentConfig.automount | default true }}
{{- end }}
{{- end }}

